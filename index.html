<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Analysis - Hong Kong</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <div class="header-content">
                <h1 class="title">🔢 Number Analysis</h1>
                <div class="header-controls">
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
                        <span class="theme-toggle-icon">🌙</span>
                    </button>
                    <button class="refresh-btn" id="refreshBtn">
                        <span class="refresh-icon">↻</span>
                        Refresh
                    </button>
                </div>
            </div>
            <p class="subtitle">Real-time statistical analysis of Hong Kong numerical sequences</p>
        </header>

        <main>
            <div id="loading" class="loading-state">
                <div class="spinner"></div>
                <p>Loading analysis data...</p>
            </div>

            <div id="error" class="error-state" style="display: none;"></div>

            <div id="content" style="display: none;">
                <!-- Hero Section with Latest Draw -->
                <section class="hero-section" id="heroSection">
                    <h2 class="section-title">Latest Draw</h2>
                    <div class="latest-draw-card" id="latestDrawCard">
                        <!-- Filled by JavaScript -->
                    </div>
                </section>

                <!-- Quick Stats Section -->
                <section class="stats-section">
                    <h2 class="section-title">Quick Insights</h2>
                    <div class="insights-grid" id="insightsGrid">
                        <!-- Filled by JavaScript -->
                    </div>
                </section>

                <!-- API Extra Info Section (Info HKJC doesn't provide) -->
                <section class="extra-info-section">
                    <h2 class="section-title">Additional Data Points</h2>
                    <div class="info-cards-grid" id="extraInfoGrid">
                        <!-- Filled by JavaScript -->
                    </div>
                </section>
            </div>
        </main>

        <footer class="footer">
            <div id="lastUpdated" class="last-updated"></div>
            <p class="footer-note">Data updates automatically every 5 minutes • Source: Public API</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
