<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Analysis - Hong Kong</title>
    
    <!-- Global styles (themes, base, utilities) -->
    <link rel="stylesheet" href="css/style.css">
    <!-- Consistent sidebar across all pages -->
    <link rel="stylesheet" href="css/sidebar.css">
    <!-- Home page specific styles -->
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar - same structure across all pages -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">🔢</div>
                <div class="sidebar-title">Number Analysis</div>
                <button class="sidebar-toggle" id="sidebarToggle">◀</button>
            </div>
            
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item active">
                <span class="nav-icon">🏠</span>
                <span class="nav-text">Home</span>
            </a>
            
            <div class="nav-section">
                <div class="nav-section-title">Reference Maps</div>
                <a href="color-map.html" class="nav-item">
                    <span class="nav-icon">🎨</span>
                    <span class="nav-text">Color Reference</span>
                </a>
            </div>
            
            <div class="nav-section">
                <div class="nav-section-title">Analysis Tools</div>
                <a href="#" class="nav-item disabled">
                    <span class="nav-icon">📊</span>
                    <span class="nav-text">Frequency Analysis</span>
                </a>
                <a href="#" class="nav-item disabled">
                    <span class="nav-icon">📈</span>
                    <span class="nav-text">Pattern Detection</span>
                </a>
            </div>
        </nav>
            
            <div class="sidebar-footer">
                <div class="theme-toggle-mini" id="themeToggleMini">
                    <span class="theme-icon">🌙</span>
                </div>
                <div class="data-status" id="dataStatus">
                    <span class="status-dot"></span>
                    Live
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <header class="content-header">
                <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
                <h1 class="page-title">Hong Kong Analysis</h1>
                <div class="header-actions">
                    <button class="refresh-btn" id="refreshBtn">
                        <span class="refresh-icon">↻</span>
                        Refresh
                    </button>
                </div>
            </header>

            <div class="content-body">
                <div class="home-container">
                    <!-- Loading State -->
                    <div id="loading" class="loading-state">
                        <div class="spinner"></div>
                        <p>Loading latest draw data...</p>
                    </div>

                    <!-- Error State -->
                    <div id="error" class="error-state" style="display: none;"></div>

                    <!-- Main Content -->
                    <div id="content" style="display: none;">
                        <!-- Latest Draw Section -->
                        <section class="latest-draw-section">
                            <h2 class="section-title">Latest Draw</h2>
                            <div id="latestDraw"></div>
                        </section>

                        <!-- Statistics Section -->
                        <section class="latest-draw-section">
                            <h2 class="section-title">Draw Statistics</h2>
                            <div id="statistics"></div>
                        </section>

                        <!-- Additional Information -->
                        <section class="latest-draw-section">
                            <h2 class="section-title">Additional Information</h2>
                            <div id="additionalInfo"></div>
                        </section>
                    </div>
                </div>
            </div>

            <footer class="content-footer">
                <div id="lastUpdated" class="last-updated"></div>
                <p class="footer-note">Data from public API • Updates every 5 minutes</p>
            </footer>
        </main>
    </div>

    <!-- Core functionality (shared across all pages) -->
    <script src="js/core.js"></script>
    <!-- Home page specific JavaScript -->
    <script src="js/index.js"></script>
</body>
</html>
