<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Analysis - Zodiac Reference</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        /* Additional compact styles for zodiac reference */
        .reference-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 10px;
        }
        
        .reference-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
            margin-bottom: 20px;
        }
        
        .reference-card {
            background: var(--bg-secondary);
            border-radius: 10px;
            padding: 8px 4px;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: transform 0.2s ease;
        }
        
        .reference-card:hover {
            transform: scale(1.05);
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .number-large {
            font-size: 1.5em;
            font-weight: bold;
            color: var(--text-primary);
        }
        
        .zodiac-emoji {
            font-size: 1.5em;
            margin: 2px 0;
        }
        
        .zodiac-name {
            font-size: 0.7em;
            color: var(--text-secondary);
        }
        
        .legend-panel {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid var(--border-color);
        }
        
        .legend-title {
            font-size: 1.1em;
            margin-bottom: 15px;
            color: var(--text-primary);
        }
        
        .legend-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }
        
        .legend-emoji {
            font-size: 1.2em;
        }
        
        .legend-text {
            font-size: 0.8em;
            color: var(--text-primary);
        }
        
        @media (max-width: 768px) {
            .reference-grid {
                grid-template-columns: repeat(5, 1fr);
            }
            
            .legend-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (max-width: 480px) {
            .reference-grid {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .legend-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .number-large {
                font-size: 1.2em;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo">🔢</div>
                <div class="sidebar-title">Number Analysis</div>
                <button class="sidebar-toggle" id="sidebarToggle">◀</button>
            </div>
            
            <nav class="sidebar-nav">
                <a href="index.html" class="nav-item">
                    <span class="nav-icon">🏠</span>
                    <span class="nav-text">Home</span>
                </a>
                
                <div class="nav-section">
                    <div class="nav-section-title">Reference Maps</div>
                    <a href="color-map.html" class="nav-item">
                        <span class="nav-icon">🎨</span>
                        <span class="nav-text">Color Reference</span>
                    </a>
                    <a href="zodiac-map.html" class="nav-item active">
                        <span class="nav-icon">🐉</span>
                        <span class="nav-text">Zodiac Reference</span>
                    </a>
                </div>
                
                <div class="nav-section">
                    <div class="nav-section-title">Analysis Tools</div>
                    <a href="#" class="nav-item disabled">
                        <span class="nav-icon">📊</span>
                        <span class="nav-text">Frequency Analysis</span>
                    </a>
                    <a href="#" class="nav-item disabled">
                        <span class="nav-icon">📈</span>
                        <span class="nav-text">Pattern Detection</span>
                    </a>
                </div>
            </nav>
            
            <div class="sidebar-footer">
                <div class="theme-toggle-mini" id="themeToggleMini">
                    <span class="theme-icon">🌙</span>
                </div>
                <div class="data-status" id="dataStatus">
                    <span class="status-dot"></span>
                    Static
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content" id="mainContent">
            <header class="content-header">
                <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>
                <h1 class="page-title">Zodiac Reference Map</h1>
                <div class="header-actions">
                    <span class="badge">Static Reference</span>
                </div>
            </header>

            <div class="content-body">
                <div class="reference-container">
                    <!-- Zodiac Grid for Numbers 1-49 -->
                    <div class="reference-grid" id="zodiacGrid"></div>
                    
                    <!-- Legend Panel -->
                    <div class="legend-panel">
                        <div class="legend-title">🐉 Zodiac Animal Legend</div>
                        <div class="legend-grid" id="zodiacLegend"></div>
                    </div>
                </div>
            </div>

            <footer class="content-footer">
                <p class="footer-note">Static reference map - Numbers 1-49 with their corresponding Chinese zodiac animals</p>
            </footer>
        </main>
    </div>

    <script>
        // Zodiac mapping for numbers 1-49 (based on traditional Chinese zodiac cycle)
        document.addEventListener('DOMContentLoaded', () => {
            // Initialize theme from core if available
            if (window.core) {
                core.initCommon();
            }
            
            const zodiacGrid = document.getElementById('zodiacGrid');
            const zodiacLegend = document.getElementById('zodiacLegend');
            
            // Zodiac data in order (12-year cycle)
            const zodiacs = [
                { emoji: '🐭', name: 'Rat', chinese: '鼠' },
                { emoji: '🐮', name: 'Ox', chinese: '牛' },
                { emoji: '🐯', name: 'Tiger', chinese: '虎' },
                { emoji: '🐰', name: 'Rabbit', chinese: '兔' },
                { emoji: '🐲', name: 'Dragon', chinese: '龙' },
                { emoji: '🐍', name: 'Snake', chinese: '蛇' },
                { emoji: '🐴', name: 'Horse', chinese: '马' },
                { emoji: '🐑', name: 'Goat', chinese: '羊' },
                { emoji: '🐵', name: 'Monkey', chinese: '猴' },
                { emoji: '🐔', name: 'Rooster', chinese: '鸡' },
                { emoji: '🐶', name: 'Dog', chinese: '狗' },
                { emoji: '🐷', name: 'Pig', chinese: '猪' }
            ];
            
            // Generate numbers 1-49 with zodiac mapping
            for (let i = 1; i <= 49; i++) {
                // Zodiac cycles every 12 numbers
                // 1=Rat, 2=Ox, 3=Tiger, etc.
                const zodiacIndex = (i - 1) % 12;
                const zodiac = zodiacs[zodiacIndex];
                
                const card = document.createElement('div');
                card.className = 'reference-card';
                card.innerHTML = `
                    <div class="number-large">${i}</div>
                    <div class="zodiac-emoji">${zodiac.emoji}</div>
                    <div class="zodiac-name">${zodiac.chinese}</div>
                `;
                
                zodiacGrid.appendChild(card);
            }
            
            // Generate legend
            zodiacs.forEach(zodiac => {
                const legendItem = document.createElement('div');
                legendItem.className = 'legend-item';
                legendItem.innerHTML = `
                    <span class="legend-emoji">${zodiac.emoji}</span>
                    <span class="legend-text">${zodiac.chinese} (${zodiac.name})</span>
                `;
                zodiacLegend.appendChild(legendItem);
            });
        });
    </script>
</body>
</html>
